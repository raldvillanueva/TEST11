<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>
  <link rel="stylesheet" href="../css/cart.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="../js/cart.js" defer></script>
</head>
<body>

<!-- ✅ BACK NAV (FIXED) -->
<nav class="nav">
  <div class="back-wrap">
    <h1 id="homepage"onclick="gotoHomePage()">SugarLoomPh</h1>
  </div>
</nav>

<!-- NAV CENTER -->
<div class="cart-container">
  <div class="cart-left">
<div class="items" id="cart-items"></div>
  </div>

  <div class="summary">
    <h3>Order Summary</h3>
    <h2>Total: ₱<span id="total">0</span></h2>

    <div class="delivery-reminder">
      🚚 <strong>Delivery Reminder:</strong> Orders may arrive anytime during the day.
    </div>

    <div class="date-picker-wrap">
      <label for="preferredDate">Preferred Delivery Date</label>
      <input type="text" id="preferredDate" placeholder="Select date" readonly>
      <span class="field-error" id="dateError"></span>
    </div>

    <div class="time-picker-wrap hidden" id="timepickerWrap">
      <label for="preferredTime">Preferred Delivery Time</label>
      <select id="preferredTime" onchange="saveTimeSlot(this.value)">
        <option value="">-- Select a time slot --</option>
        <option value="8:00 AM – 11:00 AM">8:00 AM – 11:00 AM (Morning)</option>
        <option value="11:00 AM – 2:00 PM">11:00 AM – 2:00 PM (Midday)</option>
        <option value="2:00 PM – 5:00 PM">2:00 PM – 5:00 PM (Afternoon)</option>
        <option value="5:00 PM – 8:00 PM">5:00 PM – 8:00 PM (Evening)</option>
      </select>
      <span class="field-error" id="timeError"></span>
    </div>

    <div class="contact-wrap">
      <label for="contactMethod">
        Preferred contact method (SMS, IG or Facebook)
      </label>
      <textarea id="contactMethod" placeholder="SMS/IG/FACEBOOK" onchange="saveContactMethod(this.value)"></textarea>
      <span class="field-error" id="contactError"></span>
    </div>

    <button id="checkoutBtn" onclick="checkout()">Checkout</button>
    <p id="minQtyError" style="display:none;margin:10px 0 0;font-size:14px;color:#e8527a;text-align:center;font-weight:500"></p>
    <div id="stockError" style="display:none;margin:12px 0 0;padding:12px 16px;background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;font-size:13px;color:#c2410c;line-height:1.6"></div>
    <div id="ingredientError" style="display:none;margin:12px 0 0;padding:12px 16px;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;font-size:13px;color:#dc2626;line-height:1.6"></div>
  </div>

  <div id="msg" class="msg"></div>

</div>

<!-- Login Required Modal -->
<div id="loginModal" class="login-modal-overlay" onclick="closeLoginModal()">
  <div class="login-modal-box" onclick="event.stopPropagation()">
    <p class="login-modal-icon"></p>
    <h3>Sign in required</h3>
    <p>You need to be logged in to proceed to checkout.</p>
    <button class="login-modal-btn primary" onclick="window.location.href='../pages/login.html'">Sign In</button>
    <button class="login-modal-btn secondary" onclick="closeLoginModal()">Cancel</button>
  </div>
</div>

<style>
.login-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.login-modal-overlay.show { display: flex; }
.login-modal-box {
  background: #fff;
  border-radius: 16px;
  padding: 36px 28px 28px;
  max-width: 340px;
  width: 90%;
  text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.login-modal-icon { font-size: 36px; margin: 0 0 10px; }
.login-modal-box h3 { font-size: 18px; font-weight: 700; margin: 0 0 8px; }
.login-modal-box p { color: #6B7280; font-size: 14px; margin: 0 0 20px; }
.login-modal-btn {
  display: block;
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  margin-bottom: 10px;
}
.login-modal-btn.primary { background: #111; color: #fff; }
.login-modal-btn.secondary { background: #f3f4f6; color: #374151; }
</style>

</body>
</html>
